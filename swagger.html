<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event API Swagger UI</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.onload = function() {
      const ui = SwaggerUIBundle({
        spec: window.location.href.includes('file://') ? {} : {},  // Avoid CORS for file://
        url: './openapi.yaml',
        dom_id: '#swagger-ui',
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: SwaggerUIBundle.Layouts.Standalone,
        docExpansion: 'none',
        tryItOutEnabled: true,
        filter: true,
        displayOperationId: false,
        servers: [
          { url: 'http://localhost:6000', description: 'Dev (main.py)' },
          { url: 'http://localhost:5000', description: 'Docker' }
        ]
      });
      window.ui = ui;
    };
  </script>
</body>
</html>
