openapi: 3.0.3
info:
  title: Event Management API
  description: Multi-tenant event backend API
  version: 1.0.0
servers:
  - url: http://localhost:6000
    description: Development
  - url: http://localhost:5000
    description: Docker
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        message:
          type: string
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        phone:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        display_name:
          type: string
        job_title:
          type: string
        photo_url:
          type: string
        country:
          type: string
        city:
          type: string
        company_id:
          type: string
          format: uuid
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
paths:
  /api/v1/login:
    post:
      summary: Login and get token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: zakariaaalyafawi@gmail.com
                password:
                  type: string
                  example: Abcdef@12345
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/add_tenant:
    post:
      summary: Add new user (tenant/company staff)
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - first_name
                - last_name
                - email
                - password
              properties:
                first_name:
                  type: string
                  maxLength: 100
                last_name:
                  type: string
                  maxLength: 100
                email:
                  type: string
                  maxLength: 500
                password:
                  type: string
                  minLength: 6
                phone:
                  type: string
                  maxLength: 50
                job_title:
                  type: string
                  maxLength: 200
                photo_url:
                  type: string
                  maxLength: 500
                country:
                  type: string
                  maxLength: 100
                city:
                  type: string
                  maxLength: 100
                company_id:
                  type: string
                  format: uuid
                auth_provider:
                  type: string
                  default: email
                auth_id:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'