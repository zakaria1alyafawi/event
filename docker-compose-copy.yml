services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "6000:6000"  # Changed to match docs localhost:6000
    environment:
      DB_HOST: ${DB_HOST:-89.167.92.67}  # Set to VPS IP in .env for remote postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-1234}
      DB_NAME: ${DB_NAME:-event}
      SECRET_KEY: ${SECRET_KEY:-"09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7"}
    # Removed depends_on db

volumes:
  postgres_data:  # Optional, not used now